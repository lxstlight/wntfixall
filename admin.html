<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wntfixall | ANARCHY_TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --term-green: #33ff33;
            --term-green-glow: rgba(51, 255, 51, 0.35);
            --term-amber: #ffb000;
            --term-amber-glow: rgba(255, 176, 0, 0.3);
            --term-bg: #050d06;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Share Tech Mono', monospace; }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999; background-size: 100% 4px, 6px 100%; pointer-events: none;
        }

        .terminal-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .terminal-header { border-bottom: 2px solid var(--term-green); padding-bottom: 15px; margin-bottom: 30px; text-shadow: 0 0 8px var(--term-green-glow); }
        .terminal-title { font-size: 32px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        
        .cursor-blink { display: inline-block; width: 12px; height: 24px; background: var(--term-green); margin-left: 5px; vertical-align: bottom; animation: cursorBlinkAnim 1s steps(2, start) infinite; }
        @keyframes cursorBlinkAnim { to { visibility: hidden; } }

        .terminal-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; font-size: 14px; }
        .stat-box { border: 1px solid rgba(51, 255, 51, 0.3); background: rgba(5, 13, 6, 0.5); padding: 12px; border-radius: 8px; box-shadow: inset 0 0 10px rgba(51, 255, 51, 0.05); }
        .stat-box strong { color: var(--term-amber); text-shadow: 0 0 5px var(--term-amber-glow); }

        .terminal-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 992px) { .terminal-grid { grid-template-columns: 1.2fr 0.8fr; } }

        .terminal-panel {
            border: 1px solid var(--term-green); background: rgba(4, 10, 5, 0.8); border-radius: 16px; padding: 25px;
            box-shadow: 0 0 25px rgba(51, 255, 51, 0.1), inset 0 0 15px rgba(51, 255, 51, 0.05);
        }
        .terminal-panel h3 { font-size: 20px; margin-bottom: 20px; border-bottom: 1px dashed var(--term-green); padding-bottom: 8px; color: var(--term-amber); text-shadow: 0 0 5px var(--term-amber-glow); text-transform: uppercase; }

        .term-form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .term-form-group label { font-size: 13px; color: var(--term-green); text-transform: uppercase; letter-spacing: 1px; }
        .term-control { background: #020703; border: 1px solid var(--term-green); border-radius: 8px; padding: 12px; color: var(--term-green); font-size: 14px; width: 100%; transition: all 0.3s ease; }
        .term-control:focus { outline: none; box-shadow: 0 0 12px var(--term-green-glow); border-color: #33ff33; }
        
        .term-btn {
            background: rgba(51, 255, 51, 0.1); border: 1px solid var(--term-green); color: var(--term-green); padding: 12px 24px;
            font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 100%; transition: all 0.3s ease;
        }
        .term-btn:hover { background: var(--term-green); color: #000; box-shadow: 0 0 20px var(--term-green-glow); transform: translateY(-2px); }

        .term-items-list { display: flex; flex-direction: column; gap: 15px; max-height: 550px; overflow-y: auto; padding-right: 8px; }
        .term-items-list::-webkit-scrollbar { width: 6px; }
        .term-items-list::-webkit-scrollbar-thumb { background: var(--term-green); border-radius: 3px; }

        .term-item-row { background: rgba(51, 255, 51, 0.02); border: 1px solid rgba(51, 255, 51, 0.2); border-radius: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease; }
        .term-item-row:hover { border-color: var(--term-green); background: rgba(51, 255, 51, 0.04); }
        .term-item-info { display: flex; flex-direction: column; gap: 4px; max-width: 65%; }
        .term-item-title { font-size: 16px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .term-item-meta { font-size: 12px; color: var(--term-amber); }
        .term-item-actions { display: flex; gap: 8px; }
        .term-action-btn { background: none; border: 1px solid rgba(51, 255, 51, 0.4); color: var(--term-green); padding: 6px 12px; font-size: 11px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; }
        .term-action-btn.edit:hover { background: rgba(51, 255, 51, 0.15); border-color: var(--term-green); box-shadow: 0 0 5px var(--term-green-glow); }
        .term-action-btn.delete { border-color: rgba(255, 176, 0, 0.4); color: var(--term-amber); }
        .term-action-btn.delete:hover { background: rgba(255, 176, 0, 0.15); border-color: var(--term-amber); box-shadow: 0 0 5px var(--term-amber-glow); }

        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--term-bg); z-index: 1000; }
        .hidden { display: none !important; }

        .back-nav { color: var(--term-green); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; opacity: 0.8; }
        .back-nav:hover { opacity: 1; text-shadow: 0 0 5px var(--term-green-glow); }

        .notification { position: fixed; bottom: 30px; left: 30px; background: var(--term-green); color: #000; padding: 15px 25px; border-radius: 8px; font-weight: bold; box-shadow: 0 0 20px var(--term-green-glow); z-index: 9999; animation: flash 0.3s ease; }
        @keyframes flash { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="terminal-panel" style="width: 100%; max-width: 500px; text-align: center;">
            <i class="fa-solid fa-lock" style="font-size: 40px; color: var(--term-amber); margin-bottom: 20px; text-shadow: 0 0 15px var(--term-amber-glow);"></i>
            <h3 style="border: none; text-align: center;">SYSTEM LOCKED</h3>
            <p style="margin-bottom: 25px; font-size: 14px; color: var(--term-green);">AWAITING_CREATOR_AUTHORIZATION</p>
            
            <form onsubmit="handleLogin(event)">
                <input type="password" id="adminPassword" class="term-control" required placeholder="ENTER_SECRET_KEY" style="text-align: center; letter-spacing: 4px; margin-bottom: 15px;">
                <div id="loginError" style="color: #ff3333; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: none;">ACCESS DENIED!</div>
                <button type="submit" class="term-btn">AUTHORIZE</button>
            </form>
            <a href="index.html" class="back-nav" style="margin-top: 25px; justify-content: center;"><i class="fa-solid fa-arrow-left"></i> RETURN_TO_PUBLIC_NODE</a>
        </div>
    </div>

    <div id="terminalScreen" class="terminal-container hidden">
        <a href="index.html" class="back-nav"><i class="fa-solid fa-angle-left"></i> ESC_RETURN_TO_DEN</a>
        
        <header class="terminal-header">
            <div class="terminal-title">WNT_ANARCHY_CONSL_v4.2.5<span class="cursor-blink"></span></div>
        </header>

        <div class="terminal-stats">
            <div class="stat-box"><strong>DECRYPTER_STATUS:</strong> ONLINE</div>
            <div class="stat-box"><strong>CREATOR:</strong> RaiDash</div>
            <div class="stat-box"><strong>DEN_INDEX:</strong> 100% (RAW)</div>
            <div class="stat-box" style="cursor: pointer;" onclick="logout()"><strong>ACTION:</strong> [LOGOUT_SYS]</div>
        </div>

        <div class="terminal-grid">
            <div class="terminal-panel">
                <h3 id="termFormTitle">INJECT_NEW_CONTENT_PACKET</h3>
                
                <div class="term-form-group">
                    <label>SELECT_PACKET_TYPE</label>
                    <select class="term-control" id="termContentType" onchange="toggleTermFormFields()">
                        <option value="album">1. MUSIC_RELEASE_PACKET</option>
                        <option value="blog">2. BLOG_THOUGHT_PACKET</option>
                        <option value="ai">3. NEURAL_SYNTH_WAVE_PACKET</option>
                        <option value="art">4. VISUAL_ART_DATA_PACKET</option>
                        <option value="upcoming">5. UPCOMING_RELEASE_PACKET</option>
                    </select>
                </div>

                <div style="border: 1px dashed rgba(51, 255, 51, 0.3); background: rgba(5, 15, 6, 0.6); padding: 15px; border-radius: 12px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <span style="font-size: 12px; color: var(--term-amber); text-transform: uppercase;">[CORE_DATA_STORAGE_CONTROL]</span>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button type="button" onclick="exportDataToJSON()" class="term-btn" style="padding: 8px; font-size: 11px;"><i class="fa-solid fa-download"></i> EXPORT_JSON</button>
                        <button type="button" onclick="document.getElementById('termImportJSONInput').click()" class="term-btn" style="padding: 8px; font-size: 11px; color: #00d2ff !important; border-color: #00d2ff !important;"><i class="fa-solid fa-upload"></i> IMPORT_JSON</button>
                        <input type="file" id="termImportJSONInput" accept=".json" onchange="importDataFromJSON(event)" style="display: none;">
                    </div>
                </div>

                <!-- ФОРМА: РЕЛИЗЫ -->
                <form id="termAlbumForm" onsubmit="saveTermData(event, 'album')">
                    <div class="term-form-group">
                        <label>RELEASE_TYPE</label>
                        <select class="term-control" id="albumType"><option>Альбом</option><option>Сингл</option><option>EP</option></select>
                    </div>
                    <div class="term-form-group"><label>TITLE</label><input type="text" class="term-control" id="albumTitle" required></div>
                    <div class="term-form-group"><label>YEAR</label><input type="text" class="term-control" id="albumYear" required></div>
                    <div class="term-form-group"><label>COVER_PATH</label><input type="text" class="term-control" id="albumCover"></div>
                    <div class="term-form-group"><label>DESC</label><textarea class="term-control" id="albumDesc" rows="2"></textarea></div>
                    <div class="term-form-group"><label>TRACKS (One per line)</label><textarea class="term-control" id="albumTracks" rows="3"></textarea></div>
                    <button type="submit" class="term-btn" id="btn_album">EXECUTE_INJECT</button>
                </form>

                <!-- ФОРМА: БЛОГ -->
                <form id="termBlogForm" onsubmit="saveTermData(event, 'blog')" style="display: none;">
                    <div class="term-form-group"><label>THOUGHT_HEADER</label><input type="text" class="term-control" id="blogTitle" required></div>
                    <div class="term-form-group"><label>LOG_CONTENT</label><textarea class="term-control" id="blogText" rows="6" required></textarea></div>
                    <button type="submit" class="term-btn" id="btn_blog">EXECUTE_INJECT</button>
                </form>

                <!-- ФОРМА: ИИ-ТРЕКИ -->
                <form id="termAiForm" onsubmit="saveTermData(event, 'ai')" style="display: none;">
                    <div class="term-form-group"><label>SYNTH_TITLE</label><input type="text" class="term-control" id="aiTitle" required></div>
                    <div class="term-form-group"><label>AI_MODEL</label><input type="text" class="term-control" id="aiModel" required></div>
                    <div class="term-form-group"><label>COVER_PATH</label><input type="text" class="term-control" id="aiCover"></div>
                    <div class="term-form-group"><label>AUDIO_PATH</label><input type="text" class="term-control" id="aiAudio" required></div>
                    <div class="term-form-group"><label>PROMPT</label><textarea class="term-control" id="aiPrompt" rows="2"></textarea></div>
                    <div class="term-form-group"><label>DESC</label><textarea class="term-control" id="aiDesc" rows="2"></textarea></div>
                    <div class="term-form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                        <input type="checkbox" id="aiIsFavorite" style="width: auto; height: auto; cursor: pointer;">
                        <label for="aiIsFavorite" style="cursor: pointer; font-size: 13px;">MARK_AS_FAVORITE_SIGNAL [★]</label>
                    </div>
                    <button type="submit" class="term-btn" id="btn_ai">EXECUTE_INJECT</button>
                </form>

                <!-- ФОРМА: АРТЫ -->
                <form id="termArtForm" onsubmit="saveTermData(event, 'art')" style="display: none;">
                    <div class="term-form-group"><label>ART_TITLE</label><input type="text" class="term-control" id="artTitle" required></div>
                    <div class="term-form-group"><label>ARTIST</label><input type="text" class="term-control" id="artArtist" required></div>
                    <div class="term-form-group"><label>IMAGE_PATH</label><input type="text" class="term-control" id="artImage" required></div>
                    <div class="term-form-group"><label>DESC</label><textarea class="term-control" id="artDesc" rows="2"></textarea></div>
                    <button type="submit" class="term-btn" id="btn_art">EXECUTE_INJECT</button>
                </form>

                <!-- ФОРМА: ПРЕДСТОЯЩИЕ РЕЛИЗЫ -->
                <form id="termUpcomingForm" onsubmit="saveTermData(event, 'upcoming')" style="display: none;">
                    <div class="term-form-group">
                        <label>UPCOMING_RELEASE_TYPE</label>
                        <select class="term-control" id="upcomingType"><option>Альбом</option><option>Сингл</option><option>EP</option></select>
                    </div>
                    <div class="term-form-group"><label>TITLE</label><input type="text" class="term-control" id="upcomingTitle" required></div>
                    <div class="term-form-group"><label>EXPECTED_DATE</label><input type="text" class="term-control" id="upcomingDate" required placeholder="Например: Осень 2026 / 15.11.2026"></div>
                    <div class="term-form-group"><label>COVER_PATH</label><input type="text" class="term-control" id="upcomingCover"></div>
                    <div class="term-form-group"><label>DESC</label><textarea class="term-control" id="upcomingDesc" rows="3"></textarea></div>
                    <button type="submit" class="term-btn" id="btn_upcoming">EXECUTE_INJECT</button>
                </form>
            </div>

            <div class="terminal-panel" style="border-color: var(--term-amber); box-shadow: 0 0 25px rgba(255, 176, 0, 0.1), inset 0 0 15px rgba(255, 176, 0, 0.05);">
                <h3 style="color: var(--term-green); text-shadow: 0 0 5px var(--term-green-glow); border-color: var(--term-green);">ACTIVE_SYSTEM_DATABASE</h3>
                <div style="margin-bottom: 20px;">
                    <label style="font-size: 11px; text-transform: uppercase; color: var(--term-amber); display: block; margin-bottom: 8px;">FILTER_BY_NODE_SECTOR</label>
                    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;">
                        <button onclick="filterDB('album')" class="term-btn" style="font-size: 11px; padding: 6px;">RELEASES</button>
                        <button onclick="filterDB('blog')" class="term-btn" style="font-size: 11px; padding: 6px;">LOGS</button>
                        <button onclick="filterDB('ai')" class="term-btn" style="font-size: 11px; padding: 6px;">SYNTHS</button>
                        <button onclick="filterDB('art')" class="term-btn" style="font-size: 11px; padding: 6px;">VISUALS</button>
                        <button onclick="filterDB('upcoming')" class="term-btn" style="font-size: 11px; padding: 6px; color: var(--term-amber) !important; border-color: var(--term-amber) !important;">UPCOMING</button>
                    </div>
                </div>
                <div class="term-items-list" id="dbList"></div>
            </div>
        </div>
    </div>

    <script>
        let albums = JSON.parse(localStorage.getItem('wnt_albums')) || [];
        let blogPosts = JSON.parse(localStorage.getItem('wnt_blog')) || [];
        let aiWorks = JSON.parse(localStorage.getItem('wnt_ai')) || [];
        let artWorks = JSON.parse(localStorage.getItem('wnt_arts')) || [];
        let upcomingReleases = JSON.parse(localStorage.getItem('wnt_upcoming')) || [];

        let isEditing = false;
        let editType = '';
        let editIndex = null;
        let activeFilter = 'album';

        function checkSession() {
            if (localStorage.getItem('wnt_admin_session') === 'active') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('terminalScreen').classList.remove('hidden');
                renderDB();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('terminalScreen').classList.add('hidden');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const pwd = document.getElementById('adminPassword').value;
            if (CryptoJS.MD5(pwd).toString() === "6bf29bb897fd80d3c020d3d364dcad88") {
                localStorage.setItem('wnt_admin_session', 'active');
                document.getElementById('loginError').style.display = 'none';
                checkSession();
                notify("ACCESS GRANTED");
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('adminPassword').value = '';
            }
        }

        function logout() {
            localStorage.removeItem('wnt_admin_session');
            checkSession();
        }

        function toggleTermFormFields() {
            const type = document.getElementById('termContentType').value;
            ['album', 'blog', 'ai', 'art', 'upcoming'].forEach(t => document.getElementById(`term${t.charAt(0).toUpperCase() + t.slice(1)}Form`).style.display = t === type ? 'block' : 'none');
        }

        function filterDB(type) {
            activeFilter = type;
            renderDB();
        }

        function renderDB() {
            const container = document.getElementById('dbList');
            container.innerHTML = '';
            let target = activeFilter === 'album' ? albums : activeFilter === 'blog' ? blogPosts : activeFilter === 'ai' ? aiWorks : activeFilter === 'art' ? artWorks : upcomingReleases;

            if (target.length === 0) {
                container.innerHTML = `<div style="color: var(--term-amber); text-align: center; padding: 20px;">[SECTOR_EMPTY]</div>`;
                return;
            }

            target.forEach((item, idx) => {
                let favIndicator = '';
                if (activeFilter === 'ai' && item.isFavorite) {
                    favIndicator = ' [★ FAV]';
                }
                let metaText = '';
                if (activeFilter === 'album') {
                    metaText = `TYPE: ${item.type}`;
                } else if (activeFilter === 'blog') {
                    metaText = `DATE: ${item.date}`;
                } else if (activeFilter === 'ai') {
                    metaText = `MODEL: ${item.model}${favIndicator}`;
                } else if (activeFilter === 'art') {
                    metaText = `ARTIST: ${item.artist}`;
                } else if (activeFilter === 'upcoming') {
                    metaText = `EXPECTED: ${item.expectedDate} [${item.type}]`;
                }
                
                container.innerHTML += `
                    <div class="term-item-row">
                        <div class="term-item-info">
                            <div class="term-item-title">${item.title}</div>
                            <div class="term-item-meta">${metaText}</div>
                        </div>
                        <div class="term-item-actions">
                            <button class="term-action-btn edit" onclick="startEdit('${activeFilter}', ${idx})">[EDIT]</button>
                            <button class="term-action-btn delete" onclick="deleteItem('${activeFilter}', ${idx})">[DESTROY]</button>
                        </div>
                    </div>
                `;
            });
        }

        function startEdit(type, idx) {
            isEditing = true; editType = type; editIndex = idx;
            document.getElementById('termContentType').value = type;
            document.getElementById('termContentType').disabled = true;
            toggleTermFormFields();
            document.getElementById('termFormTitle').innerHTML = `UPDATE_PACKET_#${idx}`;

            if (type === 'album') {
                document.getElementById('albumType').value = albums[idx].type;
                document.getElementById('albumTitle').value = albums[idx].title;
                document.getElementById('albumYear').value = albums[idx].year;
                document.getElementById('albumCover').value = albums[idx].cover;
                document.getElementById('albumDesc').value = albums[idx].description;
                document.getElementById('albumTracks').value = albums[idx].tracks.join('\n');
                document.getElementById('btn_album').textContent = 'SAVE_PACKET';
            } else if (type === 'blog') {
                document.getElementById('blogTitle').value = blogPosts[idx].title;
                document.getElementById('blogText').value = blogPosts[idx].text;
                document.getElementById('btn_blog').textContent = 'SAVE_PACKET';
            } else if (type === 'ai') {
                document.getElementById('aiTitle').value = aiWorks[idx].title;
                document.getElementById('aiModel').value = aiWorks[idx].model;
                document.getElementById('aiCover').value = aiWorks[idx].cover;
                document.getElementById('aiAudio').value = aiWorks[idx].audioUrl;
                document.getElementById('aiPrompt').value = aiWorks[idx].prompt;
                document.getElementById('aiDesc').value = aiWorks[idx].description;
                document.getElementById('aiIsFavorite').checked = aiWorks[idx].isFavorite || false;
                document.getElementById('btn_ai').textContent = 'SAVE_PACKET';
            } else if (type === 'art') {
                document.getElementById('artTitle').value = artWorks[idx].title;
                document.getElementById('artArtist').value = artWorks[idx].artist;
                document.getElementById('artImage').value = artWorks[idx].image;
                document.getElementById('artDesc').value = artWorks[idx].description;
                document.getElementById('btn_art').textContent = 'SAVE_PACKET';
            } else if (type === 'upcoming') {
                document.getElementById('upcomingType').value = upcomingReleases[idx].type;
                document.getElementById('upcomingTitle').value = upcomingReleases[idx].title;
                document.getElementById('upcomingDate').value = upcomingReleases[idx].expectedDate;
                document.getElementById('upcomingCover').value = upcomingReleases[idx].cover;
                document.getElementById('upcomingDesc').value = upcomingReleases[idx].description;
                document.getElementById('btn_upcoming').textContent = 'SAVE_PACKET';
            }
        }

        function saveTermData(e, type) {
            e.preventDefault();
            let data = {};
            if (type === 'album') {
                data = {
                    type: document.getElementById('albumType').value, title: document.getElementById('albumTitle').value,
                    year: document.getElementById('albumYear').value, cover: document.getElementById('albumCover').value,
                    description: document.getElementById('albumDesc').value, tracks: document.getElementById('albumTracks').value.split('\n').filter(t=>t.trim())
                };
                if(isEditing) albums[editIndex] = data; else albums.unshift(data);
                localStorage.setItem('wnt_albums', JSON.stringify(albums));
            } else if (type === 'blog') {
                data = { date: isEditing ? blogPosts[editIndex].date : new Date().toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}), title: document.getElementById('blogTitle').value, text: document.getElementById('blogText').value };
                if(isEditing) blogPosts[editIndex] = data; else blogPosts.unshift(data);
                localStorage.setItem('wnt_blog', JSON.stringify(blogPosts));
            } else if (type === 'ai') {
                data = { 
                    title: document.getElementById('aiTitle').value, 
                    model: document.getElementById('aiModel').value, 
                    cover: document.getElementById('aiCover').value, 
                    audioUrl: document.getElementById('aiAudio').value, 
                    prompt: document.getElementById('aiPrompt').value, 
                    description: document.getElementById('aiDesc').value,
                    isFavorite: document.getElementById('aiIsFavorite').checked
                };
                if(isEditing) aiWorks[editIndex] = data; else aiWorks.unshift(data);
                localStorage.setItem('wnt_ai', JSON.stringify(aiWorks));
            } else if (type === 'art') {
                data = { title: document.getElementById('artTitle').value, artist: document.getElementById('artArtist').value, image: document.getElementById('artImage').value, description: document.getElementById('artDesc').value };
                if(isEditing) artWorks[editIndex] = data; else artWorks.unshift(data);
                localStorage.setItem('wnt_arts', JSON.stringify(artWorks));
            } else if (type === 'upcoming') {
                data = {
                    type: document.getElementById('upcomingType').value,
                    title: document.getElementById('upcomingTitle').value,
                    expectedDate: document.getElementById('upcomingDate').value,
                    cover: document.getElementById('upcomingCover').value,
                    description: document.getElementById('upcomingDesc').value
                };
                if(isEditing) upcomingReleases[editIndex] = data; else upcomingReleases.unshift(data);
                localStorage.setItem('wnt_upcoming', JSON.stringify(upcomingReleases));
            }

            notify("PACKET INJECTED! EXPORT JSON TO APPLY TO SERVER.");
            resetForm();
            renderDB();
        }

        function deleteItem(type, idx) {
            if(confirm('DESTROY PACKET?')) {
                if(type==='album'){ albums.splice(idx,1); localStorage.setItem('wnt_albums', JSON.stringify(albums)); }
                if(type==='blog'){ blogPosts.splice(idx,1); localStorage.setItem('wnt_blog', JSON.stringify(blogPosts)); }
                if(type==='ai'){ aiWorks.splice(idx,1); localStorage.setItem('wnt_ai', JSON.stringify(aiWorks)); }
                if(type==='art'){ artWorks.splice(idx,1); localStorage.setItem('wnt_arts', JSON.stringify(artWorks)); }
                if(type==='upcoming'){ upcomingReleases.splice(idx,1); localStorage.setItem('wnt_upcoming', JSON.stringify(upcomingReleases)); }
                renderDB();
                notify("PACKET DESTROYED");
            }
        }

        function resetForm() {
            document.querySelectorAll('form').forEach(f => f.reset());
            document.getElementById('termContentType').disabled = false;
            document.getElementById('termFormTitle').innerHTML = 'INJECT_NEW_CONTENT_PACKET';
            isEditing = false; editType = ''; editIndex = null;
            document.querySelectorAll('.term-btn[type="submit"]').forEach(btn => btn.textContent = 'EXECUTE_INJECT');
        }

        function exportDataToJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ albums, blogPosts, aiWorks, artWorks, upcomingReleases }, null, 2));
            const a = document.createElement('a'); a.href = dataStr; a.download = "data.json"; document.body.appendChild(a); a.click(); a.remove();
        }

        function importDataFromJSON(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const d = JSON.parse(e.target.result);
                    if(d.albums) { albums = d.albums; localStorage.setItem('wnt_albums', JSON.stringify(albums)); }
                    if(d.blogPosts) { blogPosts = d.blogPosts; localStorage.setItem('wnt_blog', JSON.stringify(blogPosts)); }
                    if(d.aiWorks) { aiWorks = d.aiWorks; localStorage.setItem('wnt_ai', JSON.stringify(aiWorks)); }
                    if(d.artWorks) { artWorks = d.artWorks; localStorage.setItem('wnt_arts', JSON.stringify(artWorks)); }
                    if(d.upcomingReleases) { upcomingReleases = d.upcomingReleases; localStorage.setItem('wnt_upcoming', JSON.stringify(upcomingReleases)); }
                    renderDB(); notify("JSON CORE OVERWRITTEN");
                } catch(e) { notify("JSON PARSE ERROR"); }
            }; reader.readAsText(file);
        }

        function notify(msg) {
            const div = document.createElement('div'); div.className = 'notification'; div.textContent = msg;
            document.body.appendChild(div); setTimeout(() => { div.style.opacity=0; setTimeout(()=>div.remove(),500) }, 3000);
        }

        checkSession();
    </script>
</body>
</html>
